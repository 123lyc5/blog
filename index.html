<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小罗的博客</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #0d1117; color: #c9d1d9; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    header { text-align: center; padding: 60px 0 40px; }
    h1 { font-size: 2.5em; color: #58a6ff; margin-bottom: 10px; }
    .subtitle { color: #8b949e; font-size: 1.1em; }
    .posts { margin-top: 40px; }
    .post { background: #161b22; border: 1px solid #30363d; border-radius: 8px;
            padding: 24px; margin-bottom: 16px; }
    .post h2 { color: #58a6ff; margin-bottom: 8px; }
    .post time { color: #8b949e; font-size: 0.9em; }
    .post p { margin-top: 8px; line-height: 1.6; }
    footer { text-align: center; padding: 40px 0; color: #8b949e; }
    a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>👋 小罗的博客</h1>
      <p class="subtitle">写点代码笔记，记录一些想法</p>
    </header>

    <div class="posts">
      <article class="post">
        <h2>🚀 博客上线了</h2>
        <time>2026-05-31</time>
        <p>今天注册了 GitHub，建立了第一个博客。以后在这里记录学习笔记和项目心得。用 GitHub Pages 托管，纯静态，快如闪电 ⚡</p>
      </article>
    </div>

    <footer>
      <p>Powered by <a href="https://pages.github.com">GitHub Pages</a> · 123lyc5</p>
    </footer>
  </div>
</body>
</html>
