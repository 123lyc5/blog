<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T1 数据中心 · 2023-2026</title>
<style>
:root{--red:#e10600;--gold:#c8a951;--dark:#0a0a0a;--card:#111;--border:#222;--text:#ccc;--muted:#666}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden}

/* ===== COVER PAGE ===== */
#cover{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;
       background:linear-gradient(180deg,#000 0%,#1a0000 30%,#0a0a0a 60%,#000 100%);
       transition:opacity .6s,visibility .6s}
#cover.hidden{opacity:0;visibility:hidden;pointer-events:none}
#cover .trophy{font-size:5em;animation:float 3s ease-in-out infinite;margin-bottom:10px}
#cover h1{font-size:3em;color:#fff;text-align:center;letter-spacing:2px}
#cover h1 .red{color:var(--red)}
#cover .stars{color:var(--gold);font-size:1.5em;margin:10px 0;letter-spacing:8px}
#cover .years{color:var(--muted);font-size:1em;margin:8px 0 20px;letter-spacing:4px}
#cover .enter-btn{padding:14px 50px;background:transparent;border:2px solid var(--red);color:var(--red);
                   font-size:1.1em;cursor:pointer;letter-spacing:3px;transition:all .3s;border-radius:2px}
#cover .enter-btn:hover{background:var(--red);color:#fff;box-shadow:0 0 30px rgba(225,6,0,.4)}
#cover .roster-gallery{display:flex;gap:6px;margin:20px 0;flex-wrap:wrap;justify-content:center}
#cover .roster-chip{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
                    padding:6px 16px;border-radius:20px;font-size:.85em;color:var(--muted)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* ===== MAIN ===== */
.container{max-width:1000px;margin:0 auto;padding:20px}

/* ===== TABS ===== */
.tab-bar{display:flex;gap:0;margin:30px 0 20px;border-bottom:2px solid #1a1a1a;overflow-x:auto}
.tab-btn{padding:12px 28px;background:none;border:none;color:var(--muted);font-size:1em;
         cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;
         transition:all .2s;white-space:nowrap}
.tab-btn:hover{color:#fff}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}
.tab-btn .badge{font-size:.7em;background:var(--red);color:#fff;padding:2px 6px;border-radius:10px;margin-left:4px;vertical-align:top}

/* ===== HERO BANNER ===== */
.year-hero{text-align:center;padding:40px 20px 30px;margin-bottom:25px;
           background:linear-gradient(135deg,rgba(225,6,0,.1) 0%,rgba(0,0,0,0) 50%,rgba(200,169,81,.1) 100%);
           border:1px solid #1a1a1a;border-radius:4px;position:relative;overflow:hidden}
.year-hero .trophy-icon{font-size:3em;margin-bottom:8px}
.year-hero h2{font-size:2.2em;color:#fff}
.year-hero .result{font-size:1.3em;color:var(--gold);margin:8px 0}
.year-hero .result .champ{color:var(--gold);font-weight:900}
.year-hero .photo{max-width:100%;max-height:300px;margin-top:16px;border-radius:4px;opacity:.9;border:2px solid #222}
.year-hero .roster-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:12px}
.year-hero .roster-tag{background:rgba(255,255,255,.08);border:1px solid #333;padding:5px 14px;border-radius:20px;font-size:.85em}

/* ===== STATS GRID ===== */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:20px 0}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:18px;text-align:center}
.stat-card .num{font-size:2.2em;font-weight:900}
.stat-card .num.w{color:#4caf50}.stat-card .num.l{color:var(--red)}.stat-card .num.wr{color:var(--gold)}
.stat-card .label{color:var(--muted);font-size:.8em;margin-top:4px}

/* ===== TOURNAMENT CARDS ===== */
.tourney-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin:20px 0}
.tourney-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:20px}
.tourney-card h4{color:var(--red);margin-bottom:8px;font-size:.95em}
.tourney-card .record{font-size:1.5em;font-weight:900;margin-bottom:6px}
.tourney-card .detail{color:var(--muted);font-size:.8em;line-height:1.6}

/* ===== MATCH TABLE ===== */
table{width:100%;border-collapse:collapse;font-size:.9em;margin:15px 0}
th,td{padding:9px 12px;text-align:left;border-bottom:1px solid #151515}
th{color:var(--muted);font-weight:600;font-size:.78em;text-transform:uppercase}
tr:hover{background:rgba(255,255,255,.02)}
.result-win{color:#81c784;font-weight:700}
.result-loss{color:#ef5350;font-weight:700}
.mvp-tag{color:var(--gold);font-size:.85em}

/* ===== SUMMARY PAGE SPECIAL ===== */
.champ-timeline{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin:25px 0}
.champ-badge{text-align:center;padding:20px 24px;background:linear-gradient(135deg,rgba(200,169,81,.15),rgba(255,215,0,.05));
             border:2px solid rgba(200,169,81,.3);border-radius:8px;min-width:80px}
.champ-badge .year-num{font-size:2.5em;font-weight:900;color:var(--gold)}
.champ-badge .star{color:var(--gold);font-size:1.2em}

.footer{text-align:center;padding:40px 0;color:var(--muted);font-size:.8em;border-top:1px solid #151515;margin-top:30px}
.footer a{color:var(--red);text-decoration:none}

@media(max-width:640px){
  #cover h1{font-size:1.8em}
  .year-hero h2{font-size:1.5em}
  .tab-btn{padding:10px 16px;font-size:.85em}
}
</style>
</head>
<body>

<!-- ===== COVER ===== -->
<div id="cover">
  <div class="trophy">🏆</div>
  <h1>T1 <span class="red">数据</span>中心</h1>
  <div class="stars">★ ★ ★ ★ ★</div>
  <div class="years" id="coverYears"></div>
  <div class="roster-gallery" id="coverRoster"></div>
  <button class="enter-btn" onclick="enterDashboard()">E N T E R</button>
</div>

<!-- ===== MAIN ===== -->
<div class="container" id="mainContent">

<!-- TABS -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('summary',event)">📊 总览</button>
  <button class="tab-btn" onclick="switchTab('2026',event)">2026 <span class="badge">LIVE</span></button>
  <button class="tab-btn" onclick="switchTab('2025',event)">2025</button>
  <button class="tab-btn" onclick="switchTab('2024',event)">2024 🏆</button>
  <button class="tab-btn" onclick="switchTab('2023',event)">2023 🏆</button>
</div>

<!-- CONTENT PANELS -->
<div id="panel-summary"></div>
<div id="panel-2026" style="display:none"></div>
<div id="panel-2025" style="display:none"></div>
<div id="panel-2024" style="display:none"></div>
<div id="panel-2023" style="display:none"></div>

<div class="footer">
  <p>T1 Data Center · 2023-2026 · Data from Leaguepedia & Esports News · <a href="https://github.com/123lyc5/t1-tracker">GitHub</a></p>
  <p style="margin-top:4px">Last updated: 2026-05-31</p>
</div>

</div>

<script>
const SEASONS = {"2023": {"spring": {"w": 17, "l": 1, "rank": "1st", "playoff": "Runner-up (1-3 vs Gen.G)"}, "msi": "3rd-4th (2-3 vs JDG, 3-1 vs BLG)", "summer": {"w": 9, "l": 9, "rank": "5th", "playoff": "Runner-up (0-3 vs Gen.G)"}, "worlds": "🏆 CHAMPION (3-0 WBG)", "roster": ["Zeus", "Oner", "Faker", "Gumayusi", "Keria"], "worlds_photo": "https://w.namu.la/s/5fe6373a2e0de5ccb34d2f2a35dcd91f75ca55484e7da78311732e6bb67eec391dc90e4b30f57e00a5d7aa632cb5f853b71ba60d48f9ef7a36237082cd6b17441c7001e24d79a6f87b6e08cc55e8e06e3062a10a38c8a7cd9ae2494db12e4e24"}, "2024": {"spring": {"w": 15, "l": 3, "rank": "2nd", "playoff": "Runner-up (1-3 vs Gen.G)"}, "msi": "3rd (2-3 vs BLG)", "ewc": "🏆 EWC Champion (3-1 TES)", "summer": {"w": 11, "l": 7, "rank": "3rd", "playoff": "3rd (3-0 DK)"}, "worlds": "🏆 CHAMPION (3-2 BLG)", "roster": ["Zeus", "Oner", "Faker", "Gumayusi", "Keria"], "worlds_photo": "https://cdn.oneesports.gg/cdn-data/2024/11/LeagueOfLegends_Worlds2024_T1_Champions_LiftTrophy-1200x675.jpg"}, "2025": {"lck_cup": "🏆 Champion (3-2 vs Gen.G)", "first_stand": "Runner-up (2-3 vs HLE)", "spring": {"w": 13, "l": 5, "rank": "2nd", "playoff": "Runner-up (1-3 vs Gen.G)"}, "msi": "Runner-up (2-3 vs Gen.G)", "summer": {"w": 10, "l": 8, "rank": "4th", "playoff": "Semifinals"}, "worlds": "Top 8 (Quarterfinals)", "roster": ["Doran", "Oner", "Faker", "Gumayusi", "Smash"], "worlds_photo": ""}, "2026": {"lck_cup": "Group 5-0, Playoffs 4th (1-3 BFX, 2-3 DK)", "rounds_1_2": "12-4 (ongoing, as of May 30)", "roster": ["Doran", "Oner", "Faker", "Peyz", "Keria"], "worlds_photo": "", "matches": [{"date": "2026-01-16", "team1": "T1", "team2": "Hanwha Life", "score": "2-1", "mvp": "Faker MVP", "winner": "T1", "tournament": "LCK Cup - Group Stage"}, {"date": "2026-01-18", "team1": "T1", "team2": "DRX", "score": "2-1", "mvp": "", "winner": "T1", "tournament": "LCK Cup - Group Stage"}, {"date": "2026-01-24", "team1": "T1", "team2": "KT Rolster", "score": "2-0", "mvp": "", "winner": "T1", "tournament": "LCK Cup - Group Stage"}, {"date": "2026-01-25", "team1": "T1", "team2": "BNK FearX", "score": "2-0", "mvp": "", "winner": "T1", "tournament": "LCK Cup - Group Stage"}, {"date": "2026-01-31", "team1": "T1", "team2": "Dplus Kia", "score": "3-0", "mvp": "Doran MVP", "winner": "T1", "tournament": "LCK Cup - Group Stage"}, {"date": "2026-02-15", "team1": "T1", "team2": "BNK FearX", "score": "1-3", "mvp": "", "winner": "BNK FearX", "tournament": "LCK Cup - Playoffs"}, {"date": "2026-02-22", "team1": "T1", "team2": "Dplus Kia", "score": "2-3", "mvp": "", "winner": "Dplus Kia", "tournament": "LCK Cup - Playoffs"}, {"date": "2026-04-01", "team1": "T1", "team2": "KT Rolster", "score": "0-2", "mvp": "", "winner": "KT Rolster", "tournament": "LCK Rounds 1-2"}, {"date": "2026-04-04", "team1": "T1", "team2": "Hanwha Life", "score": "2-0", "mvp": "Faker MVP", "winner": "T1", "tournament": "LCK Rounds 1-2"}, {"date": "2026-04-08", "team1": "T1", "team2": "Gen.G", "score": "0-2", "mvp": "", "winner": "Gen.G", "tournament": "LCK Rounds 1-2"}, {"date": "2026-04-10", "team1": "T1", "team2": "DN SOOPers", "score": "2-0", "mvp": "Gumayusi MVP", "winner": "T1", "tournament": "LCK Rounds 1-2"}, {"date": "2026-04-17", "team1": "T1", "team2": "Dplus Kia", "score": "1-2", "mvp": "", "winner": "Dplus Kia", "tournament": "LCK Rounds 1-2"}, {"date": "2026-04-19", "team1": "T1", "team2": "Kiwoom DRX", "score": "2-0", "mvp": "Doran MVP", "winner": "T1", "tournament": "LCK Rounds 1-2"}, {"date": "2026-04-25", "team1": "T1", "team2": "HANJIN BRION", "score": "2-0", "mvp": "", "winner": "T1", "tournament": "LCK Rounds 1-2"}, {"date": "2026-04-26", "team1": "T1", "team2": "BNK FearX", "score": "2-0", "mvp": "Oner MVP", "winner": "T1", "tournament": "LCK Rounds 1-2"}, {"date": "2026-04-29", "team1": "T1", "team2": "NS RedForce", "score": "2-0", "mvp": "Oner POM", "winner": "T1", "tournament": "LCK Rounds 1-2"}, {"date": "2026-05-01", "team1": "T1", "team2": "Hanwha Life", "score": "1-2", "mvp": "", "winner": "Hanwha Life", "tournament": "LCK Rounds 1-2"}, {"date": "2026-05-08", "team1": "T1", "team2": "DN SOOPers", "score": "2-0", "mvp": "", "winner": "T1", "tournament": "LCK Rounds 1-2"}, {"date": "2026-05-10", "team1": "T1", "team2": "HANJIN BRION", "score": "2-0", "mvp": "", "winner": "T1", "tournament": "LCK Rounds 1-2"}, {"date": "2026-05-13", "team1": "T1", "team2": "NS RedForce", "score": "2-0", "mvp": "", "winner": "T1", "tournament": "LCK Rounds 1-2"}, {"date": "2026-05-16", "team1": "T1", "team2": "Gen.G", "score": "2-1", "mvp": "Peyz MVP", "winner": "T1", "tournament": "LCK Rounds 1-2"}, {"date": "2026-05-28", "team1": "T1", "team2": "KT Rolster", "score": "2-0", "mvp": "", "winner": "T1", "tournament": "LCK Rounds 1-2"}, {"date": "2026-05-30", "team1": "T1", "team2": "BNK FearX", "score": "2-0", "mvp": "Oner POM", "winner": "T1", "tournament": "LCK Rounds 1-2"}]}};
const SUMMARY = {"worlds_titles": 5, "worlds_years": "2013 · 2015 · 2016 · 2023 · 2024", "total_wins": 92, "total_losses": 39, "winrate": 70.2};
const CHAMPIONS = [2013, 2015, 2016, 2023, 2024];

// ===== COVER =====
document.getElementById('coverYears').textContent = CHAMPIONS.join('  ·  ');
document.getElementById('coverRoster').innerHTML = ['Zeus','Oner','Faker','Gumayusi','Keria'].map(n=>
  `<span class="roster-chip">${n}</span>`).join('');

function enterDashboard(){
  document.getElementById('cover').classList.add('hidden');
}

// ===== TAB SWITCHING =====
function switchTab(year, evt){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if (evt && evt.target) evt.target.closest('.tab-btn').classList.add('active');
  else {
    const btns = document.querySelectorAll('.tab-btn');
    const idx = {summary:0,'2026':1,'2025':2,'2024':3,'2023':4}[year]||0;
    if (btns[idx]) btns[idx].classList.add('active');
  }
  ['summary','2023','2024','2025','2026'].forEach(y=>{
    document.getElementById('panel-'+y).style.display = y===year?'block':'none';
  });
}

// ===== BUILD PANELS =====
function buildSummaryPanel(){
  const html = `
    <div class="year-hero">
      <div class="trophy-icon">👑</div>
      <h2>T1 历年数据中心</h2>
      <p style="color:var(--muted);margin-top:8px">2023 · 2024 · 2025 · 2026</p>
    </div>

    <div class="champ-timeline">
      ${CHAMPIONS.map(y=>`<div class="champ-badge"><div class="year-num">${y}</div><div class="star">🏆</div></div>`).join('')}
    </div>

    <div class="stat-row">
      <div class="stat-card"><div class="num" style="color:var(--gold)">${SUMMARY.worlds_titles}</div><div class="label">S赛冠军</div></div>
      <div class="stat-card"><div class="num w">${SUMMARY.total_wins}</div><div class="label">总胜场</div></div>
      <div class="stat-card"><div class="num l">${SUMMARY.total_losses}</div><div class="label">总负场</div></div>
      <div class="stat-card"><div class="num wr">${SUMMARY.winrate}%</div><div class="label">总胜率</div></div>
      <div class="stat-card"><div class="num" style="color:#58a6ff">4</div><div class="label">赛季</div></div>
    </div>

    <div class="tourney-row">
      ${Object.entries(SEASONS).map(([year, s]) => {
        let worlds = s.worlds || '';
        let bestResult = worlds.includes('CHAMPION') ? '🏆 S赛冠军' : worlds || '--';
        let roster = (s.roster||[]).join(' · ');
        let summary = year==='2026' ? (s.rounds_1_2||'') :
          (s.spring?`Spring ${s.spring.w}-${s.spring.l}`:'') + (s.summer?` | Summer ${s.summer.w}-${s.summer.l}`:'');
        return `<div class="tourney-card">
          <h4>${year} Season</h4>
          <div class="record" style="font-size:1.1em">${bestResult}</div>
          <div class="detail">${summary}<br>Roster: ${roster}</div>
        </div>`;
      }).join('')}
    </div>
  `;
  document.getElementById('panel-summary').innerHTML = html;
}

function buildYearPanel(year){
  const s = SEASONS[year];
  if (!s) return '<p>No data</p>';

  const isChamp2023 = year==='2023' && s.worlds && s.worlds.includes('CHAMPION');
  const isChamp2024 = year==='2024' && s.worlds && s.worlds.includes('CHAMPION');
  const hasPhoto = s.worlds_photo && s.worlds_photo.length > 0;

  let heroHTML = `
    <div class="year-hero">
      <div class="trophy-icon">${isChamp2023||isChamp2024?'🏆':'🎯'}</div>
      <h2>T1 ${year} Season</h2>
      ${s.worlds?`<div class="result">${s.worlds}</div>`:''}
      ${hasPhoto?`<img class="photo" src="${s.worlds_photo}" alt="T1 ${year} Worlds" onerror="this.style.display='none'">`:''}
      <div class="roster-row">${(s.roster||[]).map(n=>`<span class="roster-tag">${n}</span>`).join('')}</div>
    </div>
  `;

  // Stats
  let totalW = 0, totalL = 0;
  ['spring','summer'].forEach(k=>{if(s[k]&&s[k].w){totalW+=s[k].w;totalL+=s[k].l;}});
  // Add 2026 cup/rounds
  if (year==='2026' && s.matches){
    s.matches.forEach(m=>{if(m.winner==='T1')totalW++;else if(m.winner)totalL++;});
  }

  let statsHTML = totalW+totalL>0 ? `
    <div class="stat-row">
      <div class="stat-card"><div class="num w">${totalW}</div><div class="label">胜场</div></div>
      <div class="stat-card"><div class="num l">${totalL}</div><div class="label">负场</div></div>
      <div class="stat-card"><div class="num wr">${(totalW/(totalW+totalL)*100).toFixed(1)}%</div><div class="label">胜率</div></div>
    </div>` : '';

  // Tournament cards
  let tourneys = '';
  if (s.lck_cup) tourneys += `<div class="tourney-card"><h4>LCK Cup</h4><div class="detail">${s.lck_cup}</div></div>`;
  if (s.first_stand) tourneys += `<div class="tourney-card"><h4>First Stand</h4><div class="detail">${s.first_stand}</div></div>`;
  if (s.spring) tourneys += `<div class="tourney-card"><h4>Spring Regular</h4><div class="record" style="color:var(--gold)">${s.spring.w}-${s.spring.l}</div><div class="detail">Rank: ${s.spring.rank}<br>Playoffs: ${s.spring.playoff}</div></div>`;
  if (s.msi) tourneys += `<div class="tourney-card"><h4>MSI</h4><div class="detail">${s.msi}</div></div>`;
  if (s.ewc) tourneys += `<div class="tourney-card"><h4>EWC</h4><div class="detail">${s.ewc}</div></div>`;
  if (s.summer) tourneys += `<div class="tourney-card"><h4>Summer Regular</h4><div class="record" style="color:var(--gold)">${s.summer.w}-${s.summer.l}</div><div class="detail">Rank: ${s.summer.rank}<br>Playoffs: ${s.summer.playoff}</div></div>`;
  if (s.rounds_1_2) tourneys += `<div class="tourney-card"><h4>Rounds 1-2</h4><div class="detail">${s.rounds_1_2}</div></div>`;

  let tourneyHTML = tourneys ? `<div class="tourney-row">${tourneys}</div>` : '';

  // Match table (2026 only)
  let matchTable = '';
  if (year==='2026' && s.matches && s.matches.length > 0){
    const recent = [...s.matches].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20);
    matchTable = `
      <h3 style="color:var(--red);margin:25px 0 15px">📋 比赛记录</h3>
      <table><thead><tr><th>日期</th><th>对手</th><th>比分</th><th>结果</th><th>赛事</th><th>MVP</th></tr></thead>
      <tbody>${recent.map(m=>{
        const opp = m.team1==='T1'?m.team2:m.team1;
        const [s1,s2]=m.score.split('-').map(Number);
        const t1s = m.team1==='T1'?s1:s2;
        const opps = m.team1==='T1'?s2:s1;
        const isWin = t1s > opps;
        return `<tr>
          <td>${m.date}</td><td>${opp}</td><td>${t1s}-${opps}</td>
          <td class="${isWin?'result-win':'result-loss'}">${isWin?'W':'L'}</td>
          <td style="color:var(--muted);font-size:.85em">${(m.tournament||'').replace('LCK Rounds 1-2','R1-2').replace('LCK Cup - ','Cup ')}</td>
          <td class="mvp-tag">${m.mvp||'-'}</td>
        </tr>`;
      }).join('')}</tbody></table>`;
  }

  return heroHTML + statsHTML + tourneyHTML + matchTable;
}

// ===== INIT =====
buildSummaryPanel();
['2023','2024','2025','2026'].forEach(y=>{
  document.getElementById('panel-'+y).innerHTML = buildYearPanel(y);
});
</script>
</body>
</html>
