<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>T1 王朝 · 六冠数据中心</title>
<style>
:root{--r:#e10600;--g:#c8a951;--d:#0a0a0a;--c:#111;--b:#222;--t:#ccc;--m:#666}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--d);color:var(--t);overflow-x:hidden}

/* COVER */
#cover{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(180deg,#000 0%,#1a0000 30%,#0a0a0a 60%,#000 100%);transition:opacity .6s,visibility .6s}
#cover.hidden{opacity:0;visibility:hidden;pointer-events:none}
#cover .trophy{font-size:5em;animation:float 3s ease-in-out infinite;margin-bottom:10px}
#cover h1{font-size:3em;color:#fff;text-align:center;letter-spacing:2px}
#cover h1 .red{color:var(--r)}
#cover .stars{color:var(--g);font-size:1.5em;margin:10px 0;letter-spacing:8px}
#cover .yrs{color:var(--m);font-size:1em;margin:8px 0 20px;letter-spacing:4px;text-align:center}
#cover .enter-btn{padding:14px 50px;background:transparent;border:2px solid var(--r);color:var(--r);
  font-size:1.1em;cursor:pointer;letter-spacing:3px;transition:all .3s;border-radius:2px}
#cover .enter-btn:hover{background:var(--r);color:#fff;box-shadow:0 0 30px rgba(225,6,0,.4)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

.container{max-width:1100px;margin:0 auto;padding:20px}

/* TABS */
.tab-bar{display:flex;gap:0;margin:20px 0;border-bottom:2px solid #1a1a1a;overflow-x:auto}
.tab-btn{padding:12px 24px;background:none;border:none;color:var(--m);font-size:.95em;
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap}
.tab-btn:hover{color:#fff}
.tab-btn.active{color:var(--r);border-bottom-color:var(--r)}
.tab-btn .badge{font-size:.7em;background:var(--r);color:#fff;padding:2px 6px;border-radius:10px;margin-left:4px}

/* CARDS */
.hero{text-align:center;padding:30px 20px;margin-bottom:20px;
  background:linear-gradient(135deg,rgba(225,6,0,.08),rgba(0,0,0,0),rgba(200,169,81,.08));
  border:1px solid #1a1a1a;border-radius:4px}
.hero .trophy-icon{font-size:2.5em}
.hero h2{font-size:2em;color:#fff;margin:6px 0}
.hero .result{font-size:1.2em;color:var(--g);margin:6px 0}
.hero .roster-row{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-top:10px}
.hero .roster-tag{background:rgba(255,255,255,.06);border:1px solid #333;padding:4px 12px;border-radius:16px;font-size:.82em}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:16px 0}
.stat-card{background:var(--c);border:1px solid var(--b);border-radius:6px;padding:14px;text-align:center}
.stat-card .num{font-size:2em;font-weight:900}.stat-card .num.w{color:#4caf50}.stat-card .num.l{color:var(--r)}.stat-card .num.wr{color:var(--g)}
.stat-card .label{color:var(--m);font-size:.78em;margin-top:3px}

.section-title{font-size:1.1em;color:var(--r);margin:24px 0 12px;padding-bottom:6px;border-bottom:1px solid #1a1a1a}

.tourney-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;margin:14px 0}
.t-card{background:var(--c);border:1px solid var(--b);border-radius:6px;padding:16px}
.t-card h4{color:var(--r);font-size:.9em;margin-bottom:6px}
.t-card .detail{color:var(--m);font-size:.8em;line-height:1.6}

/* TABLE */
.match-table{width:100%;border-collapse:collapse;font-size:.85em;margin:10px 0}
.match-table th,.match-table td{padding:7px 10px;text-align:left;border-bottom:1px solid #151515}
.match-table th{color:var(--m);font-weight:600;font-size:.75em;text-transform:uppercase}
.match-table tr:hover{background:rgba(255,255,255,.02)}
.w-tag{color:#81c784;font-weight:700}.l-tag{color:#ef5350;font-weight:700}
.mvp-tag{color:var(--g);font-size:.8em}

/* PLAYER CARDS - expandable */
.player-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin:14px 0}
.p-card{background:var(--c);border:1px solid var(--b);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .3s}
.p-card:hover{border-color:var(--r);transform:translateY(-2px);box-shadow:0 8px 24px rgba(225,6,0,.1)}
.p-card .p-cover{height:160px;background:linear-gradient(180deg,rgba(225,6,0,.3),rgba(0,0,0,.8));position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.p-card .p-cover img{width:100%;height:100%;object-fit:cover;opacity:.75}
.p-card .p-cover .p-name-overlay{position:absolute;bottom:0;left:0;right:0;padding:30px 16px 12px;background:linear-gradient(transparent,rgba(0,0,0,.95));text-align:left}
.p-card .p-cover .p-name-overlay .pn{font-size:1.3em;font-weight:900;color:#fff}
.p-card .p-cover .p-name-overlay .pr{font-size:.78em;color:var(--m)}
.p-card .p-body{padding:14px}
.p-card .p-body .p-honor-row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0}
.p-card .p-body .p-honor-badge{background:rgba(200,169,81,.15);border:1px solid rgba(200,169,81,.25);padding:3px 10px;border-radius:12px;font-size:.72em;color:var(--g);white-space:nowrap}
.p-card .p-body .p-honor-badge.worlds{background:rgba(200,169,81,.25);border-color:rgba(200,169,81,.4)}
.p-card .p-expand{display:none;padding:0 14px 14px;border-top:1px solid #1a1a1a;animation:slideDown .3s ease}
.p-card.expanded .p-expand{display:block}
.p-card .p-expand .honor-section{margin:10px 0}
.p-card .p-expand .honor-section h5{color:var(--r);font-size:.8em;margin-bottom:4px}
.p-card .p-expand .honor-section p{color:var(--m);font-size:.78em;line-height:1.7}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* YEAR TABS in player section */
.ptabs{display:flex;gap:4px;margin:8px 0;flex-wrap:wrap}
.ptab{padding:3px 10px;background:rgba(255,255,255,.05);border:1px solid #222;border-radius:12px;
  color:var(--m);font-size:.72em;cursor:pointer;transition:all .2s}
.ptab:hover,.ptab.active{color:var(--r);border-color:var(--r)}

.footer{text-align:center;padding:30px 0;color:var(--m);font-size:.75em;border-top:1px solid #151515;margin-top:30px}
.footer a{color:var(--r);text-decoration:none}

@media(max-width:640px){
  #cover h1{font-size:1.8em}.hero h2{font-size:1.4em}
  .tab-btn{padding:10px 14px;font-size:.8em}
}
</style>
</head>

function switchTab(year,evt){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(evt&&evt.target)evt.target.closest('.tab-btn').classList.add('active');
  else{const idx={summary:0,players:1,'2026':2,'2025':3,'2024':4,'2023':5}[year]||0;
    const btns=document.querySelectorAll('.tab-btn');if(btns[idx])btns[idx].classList.add('active');}
  ['summary','players','2023','2024','2025','2026'].forEach(y=>{
    document.getElementById('panel-'+y).style.display=y===year?'block':'none';
  });

// ===== 统计函数 =====
function countMatches(yd){
  let w=0,l=0,m=[];
  ['spring','summer','rounds_1_2','rounds_3_5'].forEach(k=>{
    if(yd[k]&&yd[k].matches){
      yd[k].matches.forEach(x=>{if(x.w)w++;else l++;m.push({...x,season:k});});
    }
  });
  if(yd.detailed_matches){
    yd.detailed_matches.forEach(x=>{if(x.w)w++;else l++;m.push({...x,season:'tournament'});});
  }
  return {w,l,total:w+l,matches:m};
}

function renderMatches(matches, limit){
  if(!matches||!matches.length)return'';
  const rows=matches.slice(0,limit||999);
  return`<table class="match-table"><thead><tr><th>日期</th><th>对手</th><th>比分</th><th>结果</th><th>赛事</th>${rows.some(r=>r.mvp)?'<th>MVP</th>':''}</tr></thead>
  <tbody>${rows.map(r=>`<tr><td>${r.date}</td><td>${r.opp}</td><td>${r.score}</td>
    <td class="${r.w?'w-tag':'l-tag'}">${r.w?'W':'L'}</td>
    <td style="color:var(--m);font-size:.8em">${r.season||r.tournament||'-'}</td>
    ${r.mvp?`<td class="mvp-tag">👑 ${r.mvp}</td>`:rows.some(r=>r.mvp)?'<td>-</td>':''}</tr>`).join('')}</tbody></table>`;
}

['2023','2024','2025','2026'].forEach(year=>{
  const yd=D[year];if(!yd)return;
  const s=countMatches(yd);

  const allMS=[];
  const seasonLabels={spring:'🌸 LCK Spring',summer:'☀️ LCK Summer',rounds_1_2:'📅 LCK Rounds 1-2',rounds_3_5:'📅 LCK Rounds 3-5'};
  Object.keys(seasonLabels).forEach(k=>{if(yd[k]&&yd[k].matches)allMS.push({season:seasonLabels[k],matches:yd[k].matches.map(m=>({...m,season:'Regular Season'}))});});
  // LCK Cup group matches
  if(yd.lck_cup_matches)allMS.push({season:'🏆 LCK Cup',matches:yd.lck_cup_matches.map(m=>({...m,season:'Group Stage'}))});
  // Merge LCK playoff matches into their regular season groups
  const mergeMap={'LCK Spring':'🌸 LCK Spring','LCK Summer':'☀️ LCK Summer','LCK Cup':'🏆 LCK Cup',
    'LCK Rounds 1-2':'📅 LCK Rounds 1-2','LCK Rounds 3-5':'📅 LCK Rounds 3-5','Road to MSI':'🛣️ Road to MSI'};
  const intlOrder=['🌍 MSI','🏆 EWC','🏆 Worlds'];
  if(yd.playoff_intl_matches){
    yd.playoff_intl_matches.forEach(m=>{
      let target=null;
      for(const [prefix,label] of Object.entries(mergeMap)){
        if((m.event||'').startsWith(prefix)){target=label;break;}
      }
      if(target){
        // Find the matching regular season group and append
        let found=false;
        for(const sm of allMS){
          if(sm.season===target){sm.matches.push({date:m.date,opp:m.opp,score:m.score,w:m.w,season:m.event});found=true;break;}
        }
        if(!found){
          // No regular season group yet, create one
          allMS.push({season:target,matches:[{date:m.date,opp:m.opp,score:m.score,w:m.w,season:m.event}]});
        }
      } else {
        // International tournament - group by MSI/EWC/Worlds prefix
        let label='Other';
        if((m.event||'').startsWith('MSI'))label='🌍 MSI';
        else if((m.event||'').startsWith('EWC'))label='🏆 EWC';
        else if((m.event||'').startsWith('Worlds'))label='🏆 Worlds';
        let found=false;
        for(const sm of allMS){if(sm.season===label){sm.matches.push({date:m.date,opp:m.opp,score:m.score,w:m.w,season:m.event});found=true;break;}}
        if(!found)allMS.push({season:label,matches:[{date:m.date,opp:m.opp,score:m.score,w:m.w,season:m.event}]});
        // Keep intl groups in order
      }
    });
  }
  // Sort: LCK groups first, then international in fixed order
  allMS.sort((a,b)=>{
    const ai=intlOrder.indexOf(a.season),bi=intlOrder.indexOf(b.season);
    if(ai>=0&&bi>=0)return ai-bi;
    if(ai>=0)return 1;if(bi>=0)return -1;
    return a.season.localeCompare(b.season);
  });
  if(yd.detailed_matches)allMS.push({season:'2026 Tournaments',matches:yd.detailed_matches});
  const flatMatches=[];
  allMS.forEach(sm=>sm.matches.forEach(m=>flatMatches.push(m)));
  // Count ALL matches including playoffs/intl
  const totalW=flatMatches.filter(m=>m.w).length;
  const totalL=flatMatches.filter(m=>!m.w).length;
  let html=`

      <div class="stat-card"><div class="num">${totalW+totalL}</div><div class="label">总场次</div></div>
      <div class="stat-card"><div class="num" style="color:var(--g)">${Object.keys(yd.mvps||{}).length}</div><div class="label">MVP得主</div></div></div>`;

  // ===== T1 Team Achievement showcase =====
  if (yd.achievements && yd.achievements.length){
    html+=`<h3 class="section-title">🏆 ${year} 年 T1 完整赛事成绩</h3><div class="tourney-grid">`;
    yd.achievements.forEach(a=>{
      const isChampAch=a.result.includes('CHAMPION')||a.result.includes('Champion');
      html+=`<div class="t-card" style="${isChampAch?'border-color:rgba(200,169,81,.3)':''}">
        <h4>${a.tournament}</h4>
        <div style="font-size:1.1em;font-weight:900;color:${isChampAch?'var(--g)':'#fff'}">${a.result}</div>
        ${a.record?`<div style="color:#81c784;font-size:.85em;margin-top:2px">${a.record}</div>`:''}
        <div class="detail" style="margin-top:4px;white-space:pre-line">${a.detail}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  // ===== Per-tournament win rates =====
  const tourneyWins={};
  allMS.forEach(sm=>{
    const key=sm.season;
    if(!tourneyWins[key])tourneyWins[key]={w:0,l:0};
    sm.matches.forEach(m=>{if(m.w)tourneyWins[key].w++;else tourneyWins[key].l++;});
  });
  html+=`<h3 class="section-title">📊 各赛事胜率</h3><div class="tourney-grid">`;
  Object.entries(tourneyWins).forEach(([k,v])=>{
    const total=v.w+v.l;
    html+=`<div class="t-card" style="text-align:center"><h4>${k}</h4>
      <div style="font-size:1.3em;font-weight:900"><span style="color:#4caf50">${v.w}</span><span style="color:var(--m)">-${v.l}</span></div>
      <div class="detail">${total}场 · ${(v.w/total*100).toFixed(0)}%胜率</div></div>`;
  });
  html+=`</div>`;

  // Legacy tournament cards (for backward compat)
  html+=`<div class="tourney-grid">`;
  if(yd.lck_cup)html+=`<div class="t-card"><h4>🏆 LCK Cup</h4><div class="detail">${yd.lck_cup.result}<br>${yd.lck_cup.detail}</div></div>`;
  if(yd.first_stand)html+=`<div class="t-card"><h4>🌍 First Stand</h4><div class="detail">${yd.first_stand.result}<br>${yd.first_stand.detail}</div></div>`;
  if(yd.spring)html+=`<div class="t-card"><h4>🌸 LCK Spring</h4><div style="font-size:1.2em;font-weight:900;color:var(--g)">${yd.spring.w}-${yd.spring.l}</div><div class="detail">Rank: ${yd.spring.rank}<br>Playoffs: ${yd.spring.playoff||''}</div></div>`;
  if(yd.msi&&!yd.rounds_1_2)html+=`<div class="t-card"><h4>🌍 MSI</h4><div class="detail">${yd.msi.result}<br>${yd.msi.detail||''}</div></div>`;

  if(yd.summer)html+=`<div class="t-card"><h4>☀️ LCK Summer</h4><div style="font-size:1.2em;font-weight:900;color:var(--g)">${yd.summer.w}-${yd.summer.l}</div><div class="detail">Rank: ${yd.summer.rank}<br>Playoffs: ${yd.summer.playoff||''}</div></div>`;
  if(yd.rounds_1_2&&yd.rounds_1_2.w)html+=`<div class="t-card"><h4>📅 Rounds 1-2</h4><div style="font-size:1.2em;font-weight:900;color:var(--g)">${yd.rounds_1_2.w}-${yd.rounds_1_2.l}</div><div class="detail">Rank: ${yd.rounds_1_2.rank||''}<br>${yd.rounds_1_2.detail||''}</div></div>`;
  if(yd.road_to_msi)html+=`<div class="t-card"><h4>🛣️ Road to MSI</h4><div class="detail">${yd.road_to_msi.result}<br>${yd.road_to_msi.detail||''}</div></div>`;
  if(yd.rounds_3_5&&yd.rounds_3_5.w)html+=`<div class="t-card"><h4>📅 Rounds 3-5</h4><div style="font-size:1.2em;font-weight:900;color:var(--g)">${yd.rounds_3_5.w}-${yd.rounds_3_5.l}</div><div class="detail">Rank: ${yd.rounds_3_5.rank||''}<br>${yd.rounds_3_5.detail||''}</div></div>`;
  html+=`</div>`;

  // MVP leaderboard
  if(yd.mvps){
    const mvpSorted=Object.entries(yd.mvps).sort((a,b)=>b[1]-a[1]);
    html+=`<h3 class="section-title">👑 ${year} MVP 榜</h3><div class="tourney-grid">${mvpSorted.map(([n,c],i)=>`<div class="t-card" style="text-align:center"><h4>#${i+1} ${n}</h4><div style="font-size:1.5em;font-weight:900;color:var(--g)">${c}</div><div class="detail">次 MVP</div></div>`).join('')}</div>`;

  // Match tables - all tournaments
  allMS.forEach(sm=>{

  // Player section for this year

  html+=`</div>`;

  document.getElementById('panel-'+year).innerHTML=html;
});

  const photo=prof.photo||'';
  const role=prof.role||'';
  const worldCount=(prof.t1_worlds||[]).length;
  const mvpTotal=mvpCount||0;
  const id='pcard-'+name+'-'+(yearContext||'all');
  const nickname=prof.nickname||'';
  return `<div class="p-card" id="${id}" onclick="togglePlayer('${id}')">
    <div class="p-cover" style="background:linear-gradient(135deg,${prof.color||'#333'} 0%,#0a0a0a 100%)">
      <div style="font-size:4em;opacity:.6">${role==='Mid'?'🎯':role==='Jungle'?'🌲':role==='Top'?'🛡️':role==='ADC'?'🎯':role==='Support'?'🛡️':'👤'}</div>
      <div class="p-name-overlay"><div class="pn">${name}${worldCount?` <span style=color:var(--g);font-size:.8em>🏆x${worldCount}</span>`:''}</div><div class="pr">${role}${nickname?' · '+nickname:''}</div></div>
    </div>
    <div class="p-body">
      <div style="display:flex;gap:16px;margin-bottom:6px">
        <div><span style="font-size:1.2em;font-weight:900;color:var(--g)">${worldCount}</span><span style="font-size:.7em;color:var(--m)"> S赛</span></div>
        <div><span style="font-size:1.2em;font-weight:900;color:#58a6ff">${mvpTotal}</span><span style="font-size:.7em;color:var(--m)"> MVP</span></div>
      </div>
      <div class="p-honor-row">${(prof.t1_worlds||[]).slice(0,3).map(y=>`<span class="p-honor-badge worlds">🏆 ${y}</span>`).join('')}${(prof.t1_worlds_fmvp||[]).map(y=>`<span class="p-honor-badge">👑 FMVP ${y}</span>`).join('')}${prof.departed?`<span class="p-honor-badge" style="background:rgba(225,6,0,.15);border-color:rgba(225,6,0,.25);color:#ef5350">已离队</span>`:''}</div>
    </div>
    <div class="p-expand" style="padding:0 14px 14px;border-top:1px solid #1a1a1a">
      ${prof.departed?`<div class="honor-section"><h5>⚠️ 已离队</h5><p style="color:#ef5350">${prof.departure_note||''}</p></div>`:''}
      ${prof.sub_note?`<div class="honor-section"><h5>📝 备注</h5><p>${prof.sub_note}</p></div>`:''}
      ${prof.career?`<div class="honor-section"><h5>📅 职业生涯</h5><p>${prof.career}</p></div>`:''}

      <div class="honor-section" style="border-left:3px solid var(--r);padding-left:10px;margin:8px 0">
        <h5 style="color:var(--r)">🔴 T1 荣誉</h5>
        ${(prof.t1_worlds||[]).length?`<p>🏆 Worlds: ${prof.t1_worlds.join(' · ')}${(prof.t1_worlds_fmvp||[]).length?' | FMVP: '+prof.t1_worlds_fmvp.join(' · '):''}</p>`:'<p>🏆 Worlds: --</p>'}
        ${(prof.t1_msi||[]).length?`<p>🌍 MSI: ${prof.t1_msi.join(' · ')}${(prof.t1_msi_mvp||[]).length?' | MVP: '+prof.t1_msi_mvp.join(' · '):''}</p>`:''}
        ${(prof.t1_lck||[]).length?`<p>🇰🇷 LCK: ${prof.t1_lck.join(' · ')}${(prof.t1_lck_mvp||[]).length?' | MVP: '+prof.t1_lck_mvp.join(' · '):''}</p>`:''}
        ${(prof.t1_ewc||[]).length?`<p>🏆 EWC: ${prof.t1_ewc.join(' · ')}${(prof.t1_ewc_mvp||[]).length?' | MVP: '+prof.t1_ewc_mvp.join(' · '):''}</p>`:''}
        ${(prof.t1_lck_cup||[]).length?`<p>🏆 LCK Cup: ${prof.t1_lck_cup.join(' · ')}</p>`:''}
        ${(prof.t1_individual||[]).length?`<p>⭐ ${prof.t1_individual.join('<br>⭐ ')}</p>`:''}
        ${(prof.t1_records||[]).length?`<p>📊 ${prof.t1_records.join('<br>📊 ')}</p>`:''}
      </div>

      ${(prof.national||[]).length?`<div class="honor-section"><h5>🥇 国家队</h5><p>${prof.national.join('<br>')}</p></div>`:''}

      ${(prof.other_achievements||[]).length?`<div class="honor-section" style="border-left:3px solid #555;padding-left:10px;margin:8px 0;opacity:.75"><h5 style="color:#888">⚪ 其他队伍荣誉 (非T1时期)</h5><p>${prof.other_achievements.join('<br>')}</p></div>`:''}
    </div>
  </div>`;
}

function togglePlayer(id){
  const card=document.getElementById(id);
  if(!card)return;
  card.classList.toggle('expanded');
}

// ===== BUILD PLAYERS PANEL =====
(function(){
  const playerOrder=['Faker','Oner','Gumayusi','Keria','Zeus','Doran','Smash','Peyz'];
  let html=`<div class="hero"><div class="trophy-icon">👤</div><h2>选手数据中心</h2><p style="color:var(--m);margin-top:6px">点击选手卡片查看荣誉详情</p></div>`;
  html+=`<div class="player-grid">`;
  playerOrder.forEach(name=>{
    const prof=PROFILES[name];
    if(!prof)return;
    // Sum up total MVPs from all years
    let totalMvp=0;
    Object.values(D).forEach(yd=>{totalMvp+=yd.mvps?.[name]||0;});
    html+=buildPlayerCard(name,prof,totalMvp,'all');
  });
  html+=`</div>`;
  document.getElementById('panel-players').innerHTML=html;
})();
</script>
